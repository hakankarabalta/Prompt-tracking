<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portfolio Tracker</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/viewport.css">
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/panel.css">
</head>
<body>

<!-- ── Backdrop (mobile) ── -->
<div id="backdrop"></div>

<!-- ── Viewport / Slides ── -->
<div id="viewport">

  <div class="slide active" data-index="0">
    <iframe src="projects/project-1/index.html" title="Cosmic Dashboard" loading="lazy"></iframe>
  </div>

  <div class="slide" data-index="1">
    <iframe src="projects/project-2/index.html" title="Aurora Landing" loading="lazy"></iframe>
  </div>

  <div class="slide" data-index="2">
    <iframe src="projects/project-3/index.html" title="Neon Portfolio" loading="lazy"></iframe>
  </div>

</div>

<!-- ── Info Panel ── -->
<div id="info-panel" role="dialog" aria-label="Proje Bilgisi">
  <div class="panel-accent" id="panel-accent"></div>
  <div class="panel-body">
    <div class="panel-eyebrow">Project</div>
    <div class="panel-name"  id="panel-name">—</div>
    <div class="panel-sep"></div>
    <div class="panel-prompt-label">Prompt</div>
    <div class="panel-prompt" id="panel-prompt">—</div>
    <div class="panel-footer">
      <span class="panel-path"    id="panel-path"></span>
      <span class="panel-counter" id="panel-counter">1 / 3</span>
    </div>
  </div>
</div>

<!-- ── HUD ── -->
<button class="g-btn" id="btn-info" aria-label="Proje bilgisi">
  <div class="icon-wrap">
    <svg class="ic-info" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="16" x2="12" y2="12"/>
      <line x1="12" y1="8"  x2="12.01" y2="8"/>
    </svg>
    <svg class="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6"  x2="6"  y2="18"/>
      <line x1="6"  y1="6"  x2="18" y2="18"/>
    </svg>
  </div>
</button>

<button class="g-btn disabled" id="btn-prev" aria-label="Önceki">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<button class="g-btn" id="btn-next" aria-label="Sonraki">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"/>
  </svg>
</button>

<div id="dots"></div>

<!-- ── Scripts (sıra önemli) ── -->
<script src="js/components/ProjectRegistry.js"></script>
<script src="js/components/SlideManager.js"></script>
<script src="js/components/InfoPanel.js"></script>
<script src="js/components/Navigator.js"></script>
<script src="js/components/TouchSwipe.js"></script>
<script src="js/app.js"></script>

</body>
</html>
