<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Dashboard</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__footer">
      <button class="nav-icon" title="Profile" aria-label="Profile">👤</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Top Bar -->
    <div class="topbar">
      <h1 class="topbar__title">Analytics Overview</h1>
      <div class="topbar__actions">
        <span class="badge-live">Live</span>
        <button class="icon-btn" title="Filter">⚙</button>
        <button class="icon-btn" title="Export">↗</button>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="grid-kpi" id="kpi-grid"></div>

    <!-- Charts Row -->
    <div class="grid-charts">

      <!-- Bar Chart -->
      <div class="chart-card">
        <div class="chart-card__title">Weekly Revenue</div>
        <div id="bar-chart"></div>
      </div>

      <!-- Donut Chart -->
      <div class="chart-card">
        <div class="chart-card__title">Traffic Sources</div>
        <div class="donut-wrap">
          <svg id="donut-svg" viewBox="0 0 36 36">
            <!-- Background ring -->
            <circle cx="18" cy="18" r="15.9" fill="none"
              stroke="rgba(255,255,255,0.05)" stroke-width="3.5"/>
            <!-- Segments injected by Chart.js -->
          </svg>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>

    </div>

    <!-- Transactions Table -->
    <div class="data-table-card">
      <div class="chart-card__title">Recent Transactions</div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- Scripts -->
<script src="js/data.js"></script>
<script src="js/Chart.js"></script>
<script src="js/app.js"></script>

</body>
</html>
